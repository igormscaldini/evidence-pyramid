<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Self-Help Techniques: Evidence Pyramid</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    margin: 0;
    padding: 32px 16px 64px;
    background: #fafaf9;
    color: #1c1917;
  }
  h1 {
    text-align: center;
    margin: 0 0 8px;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .subtitle {
    text-align: center;
    color: #57534e;
    font-size: 14px;
    margin: 0 0 36px;
    max-width: 640px;
    margin-left: auto;
    margin-right: auto;
  }
  .pyramid {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    max-width: 1300px;
    margin: 0 auto;
  }
  .layer {
    border-radius: 10px;
    padding: 14px 18px;
    transition: width 0.2s ease;
  }
  .layer-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 12px;
    padding-left: 4px;
  }
  .layer-header h2 {
    margin: 0;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .layer-header .count {
    font-size: 11px;
    color: rgba(0, 0, 0, 0.5);
    font-weight: 500;
  }
  .items {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
  }
  .item {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    text-align: center;
    width: 108px;
    height: 86px;
    padding: 10px 6px;
    background: rgba(255, 255, 255, 0.75);
    border: 1px solid rgba(0, 0, 0, 0.06);
    border-radius: 8px;
    cursor: help;
    transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
  }
  .item:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
    background: white;
  }
  .item svg {
    width: 22px;
    height: 22px;
    margin-bottom: 8px;
    stroke-width: 1.5;
  }
  .item .name {
    font-size: 11px;
    line-height: 1.25;
    color: #292524;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }

  /* Layer colors + widths (pyramid taper) */
  .layer-strong         { background: #ecfdf5; width: 100%; }
  .layer-strong .item   { border-color: #6ee7b7; }
  .layer-strong svg     { color: #047857; }
  .layer-strong h2      { color: #047857; }

  .layer-mod-strong     { background: #f7fee7; width: 92%; }
  .layer-mod-strong .item { border-color: #bef264; }
  .layer-mod-strong svg { color: #4d7c0f; }
  .layer-mod-strong h2  { color: #4d7c0f; }

  .layer-moderate       { background: #fefce8; width: 78%; }
  .layer-moderate .item { border-color: #fde047; }
  .layer-moderate svg   { color: #a16207; }
  .layer-moderate h2    { color: #a16207; }

  .layer-questionable   { background: #fff7ed; width: 58%; }
  .layer-questionable .item { border-color: #fdba74; }
  .layer-questionable svg { color: #c2410c; }
  .layer-questionable h2  { color: #c2410c; }

  .layer-unsupported    { background: #fef2f2; width: 42%; }
  .layer-unsupported .item { border-color: #fca5a5; }
  .layer-unsupported svg { color: #b91c1c; }
  .layer-unsupported h2  { color: #b91c1c; }

  /* Tooltip */
  #tooltip {
    position: fixed;
    display: none;
    max-width: 340px;
    background: #1c1917;
    color: #fafaf9;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.5;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
    z-index: 1000;
    pointer-events: none;
  }
  #tooltip .tt-name {
    font-weight: 700;
    margin-bottom: 6px;
    color: white;
    font-size: 13px;
  }
  #tooltip .tt-howto {
    color: #d6d3d1;
  }

  @media (max-width: 720px) {
    .layer { width: 100% !important; }
    .item { width: 96px; height: 84px; }
  }
</style>
</head>
<body>
  <h1>Self-Help Techniques: Evidence Pyramid</h1>
  <p class="subtitle">84 techniques ranked by strength of evidence. Hover any technique to see how to do it.</p>

  <div class="pyramid">
    <div class="layer layer-unsupported">
      <div class="layer-header">
        <h2>Unsupported</h2>
        <span class="count" id="count-unsupported"></span>
      </div>
      <div class="items" id="items-unsupported"></div>
    </div>
    <div class="layer layer-questionable">
      <div class="layer-header">
        <h2>Questionable</h2>
        <span class="count" id="count-questionable"></span>
      </div>
      <div class="items" id="items-questionable"></div>
    </div>
    <div class="layer layer-moderate">
      <div class="layer-header">
        <h2>Moderate Evidence</h2>
        <span class="count" id="count-moderate"></span>
      </div>
      <div class="items" id="items-moderate"></div>
    </div>
    <div class="layer layer-mod-strong">
      <div class="layer-header">
        <h2>Moderate-to-Strong Evidence</h2>
        <span class="count" id="count-mod-strong"></span>
      </div>
      <div class="items" id="items-mod-strong"></div>
    </div>
    <div class="layer layer-strong">
      <div class="layer-header">
        <h2>Strong Evidence</h2>
        <span class="count" id="count-strong"></span>
      </div>
      <div class="items" id="items-strong"></div>
    </div>
  </div>

  <div id="tooltip">
    <div class="tt-name"></div>
    <div class="tt-howto"></div>
  </div>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
const TECHNIQUES = [
  // STRONG EVIDENCE
  { level: "strong", icon: "bike", name: "Aerobic exercise", howto: "Do brisk walking, jogging, cycling, swimming, or similar moderate-to-vigorous movement for 20–45 minutes on most days." },
  { level: "strong", icon: "dumbbell", name: "Resistance training", howto: "Train major muscle groups 2–3 times per week with progressive overload and enough recovery." },
  { level: "strong", icon: "file-text", name: "CBT Thought Record", howto: "Write the situation, emotion, automatic thought, evidence for and against it, a balanced thought, and the next action." },
  { level: "strong", icon: "list-checks", name: "ABC Technique", howto: "Record the Activating event, Belief, and Consequence, then dispute the belief and choose a more useful response." },
  { level: "strong", icon: "refresh-cw", name: "Cognitive restructuring", howto: "Identify a distorted thought, test it against evidence, and replace it with a more accurate belief." },
  { level: "strong", icon: "zap", name: "Behavioral activation", howto: "Schedule small rewarding or valued actions before motivation appears, then track mood afterward." },
  { level: "strong", icon: "trending-up", name: "Graded exposure", howto: "Build a fear hierarchy and repeatedly face the easiest feared situation until anxiety drops before advancing." },
  { level: "strong", icon: "shield", name: "ERP (exposure + prevention)", howto: "Trigger the obsession or fear while deliberately not doing the compulsion, reassurance, avoidance, or escape behavior." },
  { level: "strong", icon: "puzzle", name: "Problem-solving therapy", howto: "Define the problem, generate options, choose one, act, and review the result." },
  { level: "strong", icon: "timer", name: "Worry time", howto: "Postpone worries to a scheduled 10–20 minute window and redirect attention when they arise outside it." },
  { level: "strong", icon: "anchor", name: "Progressive relaxation", howto: "Tense and release each major muscle group in sequence while noticing the contrast." },
  { level: "strong", icon: "sparkles", name: "Mindfulness meditation", howto: "Focus on breath, body, or sound, and gently return attention whenever the mind wanders." },
  { level: "strong", icon: "bed", name: "Sleep restriction", howto: "Limit time in bed to actual sleep time, then gradually expand the window as sleep efficiency improves." },
  { level: "strong", icon: "git-branch", name: "Implementation intentions", howto: "Write a specific 'If situation X happens, then I will do behavior Y' plan." },
  { level: "strong", icon: "target", name: "Specific goal + feedback", howto: "Set a hard but reachable target and compare progress against it regularly." },
  { level: "strong", icon: "activity", name: "Self-monitoring", howto: "Record the target behavior or outcome daily so patterns become visible." },
  { level: "strong", icon: "repeat", name: "Feedback loops", howto: "Review tracked data, identify the next bottleneck, and change one variable at a time." },
  { level: "strong", icon: "lock", name: "Commitment device", howto: "Stake money, reputation, or access so quitting has a real cost." },
  { level: "strong", icon: "calendar-check", name: "Stable-cue habits", howto: "Repeat one small behavior after the same cue in the same context until it becomes automatic." },
  { level: "strong", icon: "layers", name: "Habit stacking", howto: "Attach a new behavior immediately after an existing reliable routine." },
  { level: "strong", icon: "check-square", name: "Default design", howto: "Make the good option the default and add extra steps to the bad option." },
  { level: "strong", icon: "users", name: "Social support", howto: "Join or build a group where the desired behavior is normal, visible, and reinforced." },
  { level: "strong", icon: "candy", name: "Savoring", howto: "Slow down, attend to pleasant details, and deliberately extend the positive experience." },
  { level: "strong", icon: "tree-pine", name: "Nature exposure", howto: "Spend regular time walking, sitting, or exercising in green or blue spaces." },

  // MODERATE-TO-STRONG EVIDENCE
  { level: "mod-strong", icon: "footprints", name: "Step-count target", howto: "Pick a realistic daily step target, track it, and increase it gradually when it becomes easy." },
  { level: "mod-strong", icon: "wind", name: "Diaphragmatic breathing", howto: "Breathe low into the belly at roughly 5–6 breaths per minute for several minutes." },
  { level: "mod-strong", icon: "clipboard", name: "Action planning", howto: "Specify exactly when, where, how, and with what materials you will act." },
  { level: "mod-strong", icon: "gift", name: "Temptation bundling", howto: "Pair a beneficial task with an indulgence you only allow during that task." },
  { level: "mod-strong", icon: "sprout", name: "Tiny Habits", howto: "Shrink the behavior until it feels easy, perform it after a cue, and briefly celebrate completion." },
  { level: "mod-strong", icon: "inbox", name: "GTD capture", howto: "Put every open loop into one trusted inbox, clarify the next action, and review it regularly." },
  { level: "mod-strong", icon: "home", name: "Environmental design", howto: "Change your surroundings so the desired behavior is easy and the undesired behavior is inconvenient." },
  { level: "mod-strong", icon: "compass", name: "Values clarification", howto: "Write the life domains that matter most and choose actions aligned with them." },
  { level: "mod-strong", icon: "cloud", name: "Cognitive defusion", howto: "Label thoughts as thoughts, such as 'I'm having the thought that…,' instead of treating them as commands." },
  { level: "mod-strong", icon: "heart", name: "Gratitude journaling", howto: "Write three specific things you feel grateful for each day." },
  { level: "mod-strong", icon: "star", name: "Three Good Things", howto: "Each evening, list three good events from the day and your role in them (or why they happened)." },
  { level: "mod-strong", icon: "eye", name: "Process visualization", howto: "Mentally rehearse the steps, obstacles, and responses rather than only the desired outcome." },
  { level: "mod-strong", icon: "megaphone", name: "Assertiveness scripts", howto: "State the facts, your feeling, your request, and your boundary in calm direct language." },
  { level: "mod-strong", icon: "ear", name: "Active listening", howto: "Reflect the other person's point and emotion before offering advice or disagreement." },
  { level: "mod-strong", icon: "sunrise", name: "Morning light", howto: "Get outdoor light soon after waking, ideally while moving and without sunglasses." },
  { level: "mod-strong", icon: "calendar", name: "Daily review", howto: "At day's end, note what happened, what worked, what failed, and tomorrow's priority." },
  { level: "mod-strong", icon: "scroll-text", name: "Personal mission", howto: "Draft a short statement of principles, roles, and long-term aims and revisit it regularly." },
  { level: "mod-strong", icon: "pie-chart", name: "Life audit", howto: "Rate major life domains, choose the lowest rated high-value domain, and set one action." },
  { level: "mod-strong", icon: "headphones", name: "Deep Work", howto: "Schedule distraction-free blocks for cognitively demanding work and remove communication channels." },
  { level: "mod-strong", icon: "moon", name: "Sleep stimulus control", howto: "Use bed only for sleep and sex, leave if awake too long, and keep a consistent wake time." },
  { level: "mod-strong", icon: "alarm-clock", name: "Fixed wake time", howto: "Wake at the same time every day, including weekends, to stabilize the sleep-wake rhythm." },

  // MODERATE EVIDENCE (incl. former Plausible)
  { level: "moderate", icon: "target", name: "SMART goals", howto: "Convert a vague aim into a Specific, Measurable, Achievable, Relevant, and Time-bound target." },
  { level: "moderate", icon: "lightbulb", name: "WOOP", howto: "Name the Wish, Outcome, Obstacle, and Plan an if-then response to the obstacle." },
  { level: "moderate", icon: "timer", name: "Pomodoro Technique", howto: "Work on one task for about 25 minutes, take a short break, and repeat." },
  { level: "moderate", icon: "calendar", name: "Time blocking", howto: "Reserve calendar blocks in advance for specific work you want to do during them, for time to rest, for time to exercise, etc." },
  { level: "moderate", icon: "user-check", name: "Accountability partner", howto: "Tell someone the exact commitment and report completion on a fixed schedule." },
  { level: "moderate", icon: "heart-handshake", name: "Self-compassion break", howto: "Notice suffering, remind yourself it is human, and speak to yourself as a good coach would." },
  { level: "moderate", icon: "hand-heart", name: "Acts of kindness", howto: "Perform small concrete helpful acts and notice their effects on others and yourself." },
  { level: "moderate", icon: "pen-line", name: "Expressive writing", howto: "Privately write for 15–20 minutes about a stressful event and what it means." },
  { level: "moderate", icon: "star", name: "Best Possible Self", howto: "Write vividly about a realistic future in which important goals have gone well." },
  { level: "moderate", icon: "trophy", name: "Strengths use", howto: "Identify a character strength and use it in a new way each day." },
  { level: "moderate", icon: "notebook", name: "Daily journaling", howto: "Write a brief uncensored account of thoughts, decisions, and lessons each day." },
  { level: "moderate", icon: "check-circle", name: "No Zero Days", howto: "Do at least one tiny action toward the goal every day, even on bad days." },
  { level: "moderate", icon: "snowflake", name: "Cold exposure", howto: "Expose yourself briefly to cold water, starting mild and short, and observe stress or mood effects." },
  { level: "moderate", icon: "wind", name: "Breathwork systems", howto: "Follow a fixed pattern such as box breathing, 4-7-8 breathing, or cyclic hyperventilation with recovery." },
  { level: "moderate", icon: "waves", name: "Urge surfing", howto: "Notice craving sensations as waves, breathe, and wait without acting until they crest and fall." },
  { level: "moderate", icon: "user", name: "Identity-based habits", howto: "Treat each small behavior as evidence for the identity you want to strengthen." },
  { level: "moderate", icon: "key", name: "Keystone habit", howto: "Pick one habit likely to improve other behaviors or make other habits easier and work on developing that habit first." },
  { level: "moderate", icon: "link", name: "Don't Break the Chain", howto: "Mark each day you complete the habit and try to preserve the streak." },
  { level: "moderate", icon: "flag", name: "Eat the Frog", howto: "Do the most aversive high-value task first in the workday." },
  { level: "moderate", icon: "battery-low", name: "Dopamine fast", howto: "Take a planned break from compulsive high-reward behaviors and replace them with low-stimulation activities." },

  // QUESTIONABLE
  { level: "questionable", icon: "user", name: "Power posing", howto: "Stand or sit expansively for a minute or two before a challenging interaction." },
  { level: "questionable", icon: "hand", name: "EFT / tapping", howto: "While naming a distressing issue, tap through the standard point sequence and re-rate emotional intensity." },
  { level: "questionable", icon: "image", name: "Vision board", howto: "Create a collage of goal-related images or words." },
  { level: "questionable", icon: "message-circle", name: "Positive affirmations", howto: "Repeat short positive statements about yourself (e.g., 'I am strong and capable.')." },
  { level: "questionable", icon: "clover", name: "Lucky Girl Syndrome", howto: "Repeat that things tend to work out for you and look for opportunities that match the expectation." },
  { level: "questionable", icon: "feather", name: "Scripting manifestation", howto: "Write a future scene as if the desired outcome has already happened." },
  { level: "questionable", icon: "headphones", name: "Binaural beats", howto: "Listen to two slightly different tones through headphones to try to induce a target mental state." },
  { level: "questionable", icon: "puzzle", name: "Brain training games", howto: "Play cognitive games daily, but expect improvement mainly on trained or nearby tasks rather than broad intelligence." },
  { level: "questionable", icon: "hourglass", name: "10,000-hour rule", howto: "Accumulate practice hours, but do not expect hours alone to overcome feedback quality, genetics, timing, and domain constraints." },
  { level: "questionable", icon: "bed-double", name: "Polyphasic sleep", howto: "Split sleep into many short naps to reduce total sleep." },

  // UNSUPPORTED
  { level: "unsupported", icon: "hash", name: "369 method", howto: "Write a desired outcome 3 times in the morning, 6 times midday, and 9 times at night." },
  { level: "unsupported", icon: "volume-2", name: "Subliminal audio", howto: "Play affirming messages below conscious audibility while relaxing or sleeping." },
  { level: "unsupported", icon: "music", name: "Solfeggio frequencies", howto: "Play tracks marketed as specific healing frequencies during meditation, rest, or work." },
  { level: "unsupported", icon: "gem", name: "Crystals for healing", howto: "Hold or display a crystal to balance energy or heal yourself." },
  { level: "unsupported", icon: "moon-star", name: "Astrology planning", howto: "Choose goals or timing based on horoscopes, signs, or transits." },
  { level: "unsupported", icon: "calculator", name: "Numerology goals", howto: "Select goals, dates, or habits based on personally meaningful numbers." },
  { level: "unsupported", icon: "magnet", name: "Law of Attraction", howto: "Think, visualize, or 'vibrate' as if the desired outcome is inevitable or has already happened." },
  { level: "unsupported", icon: "shuffle", name: "Multitasking hack", howto: "Rapidly switch between tasks or media streams to get multiple things done at once." },
  { level: "unsupported", icon: "glass-water", name: "Detox cleanses", howto: "Use juices, teas, fasting, or colon cleanses to 'flush toxins' from the body." },
];

const LEVEL_TO_CONTAINER = {
  "strong": "items-strong",
  "mod-strong": "items-mod-strong",
  "moderate": "items-moderate",
  "questionable": "items-questionable",
  "unsupported": "items-unsupported",
};
const LEVEL_TO_COUNT = {
  "strong": "count-strong",
  "mod-strong": "count-mod-strong",
  "moderate": "count-moderate",
  "questionable": "count-questionable",
  "unsupported": "count-unsupported",
};

// Render items
const counts = {};
TECHNIQUES.forEach(t => {
  const container = document.getElementById(LEVEL_TO_CONTAINER[t.level]);
  const el = document.createElement("div");
  el.className = "item";
  el.dataset.name = t.name;
  el.dataset.howto = t.howto;
  el.innerHTML = `<i data-lucide="${t.icon}"></i><span class="name">${t.name}</span>`;
  container.appendChild(el);
  counts[t.level] = (counts[t.level] || 0) + 1;
});
Object.keys(counts).forEach(level => {
  document.getElementById(LEVEL_TO_COUNT[level]).textContent = counts[level] + " techniques";
});

// Lucide icons
lucide.createIcons();

// Tooltip behavior
const tooltip = document.getElementById("tooltip");
const ttName = tooltip.querySelector(".tt-name");
const ttHowto = tooltip.querySelector(".tt-howto");

document.querySelectorAll(".item").forEach(item => {
  item.addEventListener("mouseenter", e => {
    ttName.textContent = item.dataset.name;
    ttHowto.textContent = item.dataset.howto;
    tooltip.style.display = "block";
    positionTooltip(e);
  });
  item.addEventListener("mousemove", positionTooltip);
  item.addEventListener("mouseleave", () => {
    tooltip.style.display = "none";
  });
});

function positionTooltip(e) {
  const padding = 14;
  const rect = tooltip.getBoundingClientRect();
  let x = e.clientX + padding;
  let y = e.clientY + padding;
  if (x + rect.width > window.innerWidth - 8) x = e.clientX - rect.width - padding;
  if (y + rect.height > window.innerHeight - 8) y = e.clientY - rect.height - padding;
  tooltip.style.left = x + "px";
  tooltip.style.top = y + "px";
}
</script>
</body>
</html>
